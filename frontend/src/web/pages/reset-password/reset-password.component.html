<div class="reset-page">
    <div class="reset-card">
        <div class="logo"> stay<span>Sphere</span></div>
        <h3>Reset Password</h3>
        <p>Your security is our priority. Enter a strong new password.</p>

        <form [formGroup]="resetForm" (ngSubmit)="onSubmit()">
            <div class="form-group">
                <label>New Password</label>
                <div class="input-wrapper">
                    <input [type]="showPassword ? 'text' : 'password'" class="form-control" formControlName="password"
                        placeholder="Minimum 6 characters" />
                    <button type="button" class="eye-btn" (click)="showPassword = !showPassword">
                        <i class="bi" [class.bi-eye]="!showPassword" [class.bi-eye-slash]="showPassword"></i>
                    </button>
                </div>
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <div class="input-wrapper">
                    <input [type]="showConfirmPassword ? 'text' : 'password'" class="form-control"
                        formControlName="confirmPassword" placeholder="Repeat password" />
                    <button type="button" class="eye-btn" (click)="showConfirmPassword = !showConfirmPassword">
                        <i class="bi" [class.bi-eye]="!showConfirmPassword"
                            [class.bi-eye-slash]="showConfirmPassword"></i>
                    </button>
                </div>
            </div>

            <div *ngIf="error" class="error-banner">
                <span></span> {{ error }}
            </div>
            <div *ngIf="success" class="success-banner">
                <span></span> {{ success }}
            </div>

            <button class="btn-reset" type="submit" [disabled]="resetForm.invalid || isLoading">
                {{ isLoading ? 'Updating Password...' : 'Reset Password →' }}
            </button>
        </form>

        <div class="footer-links">
            <a routerLink="/login">Back to Login</a>
        </div>
    </div>
</div>
