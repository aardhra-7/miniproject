<div class="dashboard-layout">
    <web-sidebar [role]="'faculty'"></web-sidebar>
    <div class="main-content">
        <web-topbar [pageTitle]="'Mess Cut Requests'" [userName]="user?.name || 'Faculty'"></web-topbar>
        <main class="page-content animate-fade-in">

            <div class="card p-24 mb-24">
                <div class="section-header">
                    <h3>Request Mess Cut</h3>
                    <i class="bi bi-cup-straw section-icon orange-text"></i>
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label>From Date</label>
                        <input type="date" class="form-control" [(ngModel)]="messCutForm.startDate" />
                    </div>
                    <div class="form-group">
                        <label>To Date</label>
                        <input type="date" class="form-control" [(ngModel)]="messCutForm.endDate" />
                    </div>
                    <div class="form-group full-width">
                        <textarea class="form-control" rows="2" placeholder="Optional"
                            [(ngModel)]="messCutForm.reason"></textarea>
                    </div>
                </div>
                <button class="primary-btn mt-16" (click)="submitMessCut()">
                    Submit Request <i class="bi bi-send-fill ml-8"></i>
                </button>
            </div>

            <div class="card p-24">
                <div class="section-header">
                    <h3>Mess Cut History</h3>
                    <i class="bi bi-receipt section-icon orange-text"></i>
                </div>
                <div class="table-responsive">
                    <table class="history-table">
                        <thead>
                            <tr>
                                <th>From</th>
                                <th>To</th>
                                <th>Reason</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr *ngFor="let item of messCutHistory">
                                <td>{{ item.startDate | date:'dd MMM yyyy' }}</td>
                                <td>{{ item.endDate | date:'dd MMM yyyy' }}</td>
                                <td>{{ item.reason || '-' }}</td>
                                <td>
                                    <span class="status-badge" [class.pending]="item.status === 'pending'"
                                        [class.approved]="item.status === 'approved'">
                                        {{ item.status | titlecase }}
                                    </span>
                                </td>
                            </tr>
                            <tr *ngIf="messCutHistory.length === 0">
                                <td colspan="4" class="empty-td text-center">No history found</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>
</div>
