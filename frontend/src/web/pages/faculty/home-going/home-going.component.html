<div class="dashboard-layout">
    <web-sidebar [role]="'faculty'"></web-sidebar>
    <div class="main-content">
        <web-topbar [pageTitle]="'Home Going Records'" [userName]="user?.name || 'Faculty'"></web-topbar>
        <main class="page-content animate-fade-in">

            <div class="card p-24 mb-24">
                <div class="section-header">
                    <h3>Record Home Going</h3>
                    <i class="bi bi-houses section-icon purple-text"></i>
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Leave Date</label>
                        <input type="date" class="form-control" [(ngModel)]="homeGoingForm.leaveDate" />
                    </div>
                    <div class="form-group">
                        <label>Destination</label>
                        <input type="text" class="form-control" placeholder="Enter Place"
                            [(ngModel)]="homeGoingForm.place" />
                    </div>
                    <div class="form-group full-width">
                        <textarea class="form-control" rows="2" placeholder="Optional"
                            [(ngModel)]="homeGoingForm.reason"></textarea>
                    </div>
                </div>
                <button class="primary-btn mt-16" (click)="submitHomeGoing()">
                    Mark Home Going <i class="bi bi-geo-alt-fill ml-8"></i>
                </button>
            </div>

            <div class="card p-24">
                <div class="section-header">
                    <h3>Home Going History</h3>
                    <i class="bi bi-clock-history section-icon purple-text"></i>
                </div>
                <div class="table-responsive">
                    <table class="history-table">
                        <thead>
                            <tr>
                                <th>Leave Date</th>
                                <th>Destination</th>
                                <th>Reason</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr *ngFor="let item of homeGoingHistory">
                                <td>{{ item.leaveDate | date:'dd MMM yyyy' }}</td>
                                <td>{{ item.place }}</td>
                                <td>{{ item.reason || '-' }}</td>
                                <td>
                                    <span class="status-badge marked">Recorded</span>
                                </td>
                            </tr>
                            <tr *ngIf="homeGoingHistory.length === 0">
                                <td colspan="4" class="empty-td text-center">No history found</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>
</div>
